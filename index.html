<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>✨ Ramadhan Ceria · 30 Hari Reward Keluarga</title>
    <!-- Google Font & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f9f0d4 0%, #fce2c1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 16px 12px;
        }

        .app-container {
            max-width: 750px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 60px 60px 40px 40px;
            box-shadow: 0 30px 50px rgba(241, 143, 1, 0.2), 0 20px 40px rgba(0, 60, 80, 0.1);
            overflow: hidden;
            padding: 28px 22px 35px;
            border: 3px solid #ffffffaa;
        }

        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #b43b0d, #e97c1f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.5px;
        }

        .header h1 i {
            background: #ffd966;
            padding: 12px;
            border-radius: 50%;
            color: #b45f06;
            font-size: 1.5rem;
            box-shadow: 0 8px 0 #b45f06;
            transform: translateY(-3px);
        }

        .btn-reset {
            background: #ffcf8a;
            border: 3px solid white;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 0 #b45f06, 0 6px 12px rgba(0, 0, 0, 0.1);
            transition: 0.1s ease;
            font-size: 1.2rem;
            color: #7b4a1e;
        }

        .btn-reset:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #b45f06;
        }

        .balance-cards {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 25px;
            justify-content: center;
        }

        .balance-item {
            flex: 1 0 130px;
            background: linear-gradient(145deg, #feeac2, #ffd9a3);
            border-radius: 40px 40px 30px 30px;
            padding: 14px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 3px solid white;
            box-shadow: 0 10px 0 #bb6b2e, 0 6px 15px #e6933e80;
            transition: 0.2s;
        }

        .balance-item:hover {
            transform: scale(1.02);
        }

        .balance-item .avatar {
            font-size: 2rem;
            filter: drop-shadow(2px 4px 2px rgba(0, 0, 0, 0.1));
        }

        .balance-item .name {
            font-weight: 800;
            color: #6b3f00;
            font-size: 1.1rem;
            margin: 4px 0 2px;
        }

        .balance-item .value {
            font-size: 2.5rem;
            font-weight: 900;
            color: #1f6d3b;
            line-height: 1.1;
            text-shadow: 2px 2px 0 #ffe3b0;
        }

        .balance-item .small {
            font-size: 0.8rem;
            background: #ffffffaa;
            padding: 4px 12px;
            border-radius: 30px;
            color: #563e1f;
            font-weight: 600;
        }

        .child-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .tab-child {
            flex: 1 0 auto;
            background: #ffe8c7;
            border: 3px solid white;
            border-radius: 50px;
            padding: 14px 0;
            font-weight: 700;
            font-size: 1rem;
            color: #8d5200;
            cursor: pointer;
            transition: 0.2s;
            min-width: 115px;
            box-shadow: 0 6px 0 #b8772e;
        }

        .tab-child.active {
            background: #fb8b2c;
            color: white;
            box-shadow: 0 8px 0 #9f5100;
            transform: scale(0.98);
        }

        .date-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #ffeacc;
            border-radius: 60px;
            padding: 6px 12px;
            margin-bottom: 24px;
            border: 3px solid white;
            box-shadow: 0 6px 0 #b8772e;
        }

        .date-nav button {
            background: #ffb156;
            border: 3px solid white;
            font-size: 2rem;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #633d0e;
            box-shadow: 0 4px 0 #9f5100;
            transition: 0.1s;
        }

        .date-nav button:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #9f5100;
        }

        .date-display {
            font-weight: 800;
            font-size: 1.2rem;
            color: #492d0b;
            background: white;
            padding: 10px 18px;
            border-radius: 50px;
            box-shadow: inset 0 -3px 0 #e6b881;
        }

        .tasks-list {
            background: #fef9e6;
            border-radius: 50px;
            padding: 22px 18px;
            margin-bottom: 30px;
            border: 4px solid white;
            box-shadow: 0 12px 0 #cc8e4b, 0 8px 20px #f1b36b;
            max-height: 420px;
            overflow-y: auto;
        }

        .task-row {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 10px;
            border-bottom: 2px dashed #ffc107;
            transition: 0.2s;
            border-radius: 40px;
        }

        .task-row:hover {
            background: #ffefd2;
        }

        .task-icon {
            font-size: 1.5rem;
            width: 36px;
            text-align: center;
            filter: drop-shadow(2px 2px 0 #ffb347);
        }

        .task-name {
            flex: 1;
            font-weight: 600;
            color: #3b280b;
            font-size: 1rem;
        }

        .task-point {
            background: #ffd89c;
            border-radius: 40px;
            padding: 6px 16px;
            font-weight: 800;
            color: #5e3200;
            font-size: 0.9rem;
            border: 2px solid white;
            white-space: nowrap;
        }

        .task-counter {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .task-counter button {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid white;
            background: #ffb156;
            color: white;
            font-weight: 800;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 4px 0 #9f5100;
            transition: 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .task-counter button:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #9f5100;
        }

        .task-counter span {
            min-width: 30px;
            text-align: center;
            font-weight: 700;
            font-size: 1.2rem;
            color: #5e3200;
        }

        .reward-section {
            background: #fce9cf;
            border-radius: 60px 60px 30px 30px;
            padding: 26px 20px;
            border: 5px solid white;
            box-shadow: 0 12px 0 #b8772e, 0 12px 25px #e79a4e;
            margin-top: 25px;
        }

        .reward-section h2 {
            font-size: 2rem;
            font-weight: 800;
            color: #793f0e;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .reward-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
            gap: 18px;
        }

        .reward-card {
            background: white;
            border-radius: 40px;
            padding: 18px 12px;
            border: 3px solid #fec382;
            box-shadow: 0 8px 0 #d47f2a, 0 6px 12px rgba(0, 0, 0, 0.1);
            transition: 0.15s;
        }

        .reward-card:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #d47f2a;
        }

        .reward-name {
            font-weight: 800;
            color: #5d3b12;
            font-size: 1rem;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .reward-price {
            background: #fecb8b;
            border-radius: 30px;
            padding: 5px 14px;
            display: inline-block;
            font-weight: 700;
            margin-bottom: 14px;
            font-size: 0.9rem;
            border: 2px solid white;
        }

        .redeem-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .btn-redeem {
            background: #f09b22;
            border: 3px solid white;
            border-radius: 40px;
            padding: 8px 6px;
            color: white;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-left: 15px;
            padding-right: 10px;
            box-shadow: 0 4px 0 #9f5100;
            transition: 0.1s;
        }

        .btn-redeem:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #9f5100;
        }

        .btn-redeem:disabled {
            background: #cfa87a;
            box-shadow: 0 4px 0 #7b572b;
            pointer-events: none;
            opacity: 0.7;
        }

        .redeem-count {
            background: #fdeaac;
            border-radius: 30px;
            padding: 3px 10px;
            color: #633d0e;
            font-weight: 800;
        }

        footer {
            text-align: center;
            color: #7a5d3b;
            margin-top: 30px;
            font-size: 1rem;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <div class="header">
            <h1>
                <i class="fas fa-moon"></i>
                Ramadhan Ceria
            </h1>
            <button class="btn-reset" id="resetBtn" title="Reset semua progres"><i class="fas fa-undo-alt"></i></button>
        </div>

        <!-- Saldo 4 anak -->
        <div class="balance-cards" id="balanceCards"></div>

        <!-- Tab pilih anak -->
        <div class="child-tabs" id="childTabs"></div>

        <!-- Navigasi tanggal -->
        <div class="date-nav">
            <button id="prevDateBtn"><i class="fas fa-chevron-left"></i></button>
            <span class="date-display" id="currentDateDisplay">Hari Kamis · 19 Feb</span>
            <button id="nextDateBtn"><i class="fas fa-chevron-right"></i></button>
        </div>

        <!-- Daftar tugas -->
        <div class="tasks-list" id="tasksContainer"></div>

        <!-- Reward -->
        <div class="reward-section">
            <h2><i class="fas fa-gift"></i> Yuk Tukar Poin!</h2>
            <div class="reward-grid" id="rewardGrid"></div>
        </div>
        <footer>✨ klik + / - untuk catat jumlah tugas · poin otomatis ✨</footer>
    </div>

    <script>
        (function () {
            // ------------------------------------------------------------
            // KONFIGURASI API (sesuaikan dengan endpoint yang sudah berjalan)
            // ------------------------------------------------------------
            // ------------------------------------------------------------
            // KONFIGURASI API (sesuaikan dengan endpoint yang sudah berjalan)
            // ------------------------------------------------------------
            // Gunakan HTTPS agar bisa di-hosting di GitHub Pages tanpa Mixed Content Error
            const API_URL = 'https://cintabuku.com/ramadhan/api';
            // Jika testing lokal/HTTP bisa pakai: 'http://103.107.206.10:3005/api';

            // ------------------------------------------------------------
            // DATA STATIS (harus sama dengan isi database)
            // ------------------------------------------------------------
            const children = [
                { id: 'kaka', name: 'Kaka Fatimah', short: 'Kaka', icon: '🧕' },
                { id: 'teteh', name: 'Teteh Aisyah', short: 'Teteh', icon: '🧕' },
                { id: 'kahfi', name: 'Mas Kahfi', short: 'Kahfi', icon: '👦' },
                { id: 'zahira', name: 'Zahira', short: 'Zahira', icon: '🧕' }
            ];

            const tasks = [
                { name: "Menyapu dalam rumah", icon: "🧹", point: 1 },
                { name: "Menyapu luar rumah", icon: "🧹", point: 1 },
                { name: "Mengepel", icon: "🧼", point: 1 },
                { name: "Mencuci baju", icon: "🧺", point: 2 },
                { name: "Menjemur baju", icon: "☀️", point: 1 },
                { name: "Mencuci piring (alat masak)", icon: "🍽️", point: 2 },
                { name: "Mencuci piring & alat makan", icon: "🥄", point: 1 },
                { name: "Mengerjakan Mtk 35 soal", icon: "📐", point: 3 },
                { name: "Baca buku 5 halaman + tanya", icon: "📚", point: 3 },
                { name: "Baca al quran 5 lembar", icon: "📖", point: 3 },
                { name: "Menghafal al quran 3 ayat", icon: "🤲", point: 3 },
                { name: "Tidak berantem (Zahira)", icon: "🕊️", point: 3 },
                { name: "Mencuci sepatu semua", icon: "👟", point: 2 },
                { name: "Merapikan tempat tidur", icon: "🛏️", point: 1 },
                { name: "Sholat Subuh", icon: "🕋", point: 1 },
                { name: "Sholat Dzuhur", icon: "🕋", point: 1 },
                { name: "Sholat Ashar", icon: "🕋", point: 1 },
                { name: "Sholat Maghrib", icon: "🕋", point: 1 },
                { name: "Sholat Isya", icon: "🕋", point: 1 },
                { name: "Puasa full 1 hari", icon: "🌙", point: 2 },
                { name: "Sholat dhuha", icon: "🌅", point: 1 },
                { name: "Sholat tarawih jamaah", icon: "🕌", point: 2 },
                { name: "Olahraga 30 menit", icon: "⚽", point: 1 },
                { name: "Kuliah subuh", icon: "📻", point: 2 },
                { name: "Shalat tahajud", icon: "⭐", point: 1 }
            ];

            const rewards = [
                { name: "Main game 30 menit", icon: "🎮", price: 15 },
                { name: "3 risol", icon: "🥟", price: 1 },
                { name: "3 Jely", icon: "🍮", price: 1 },
                { name: "3 brownis", icon: "🍫", price: 1 },
                { name: "3 bolu pisang", icon: "🍌", price: 1 },
                { name: "Susu ultra putih", icon: "🥛", price: 2 },
                { name: "Susu ultra coklat", icon: "🥛", price: 3 },
                { name: "Susu ultra pink", icon: "🥛", price: 3 },
                { name: "Beng beng", icon: "🍫", price: 2 },
                { name: "Soto", icon: "🍲", price: 10 },
                { name: "Mixue", icon: "🍦", price: 15 },
                { name: "Lazato/chicken", icon: "🍗", price: 15 },
                { name: "Mie ayam", icon: "🍜", price: 10 },
                { name: "Qtela", icon: "🍟", price: 1 },
                { name: "3 pastel", icon: "🥧", price: 1 },
                { name: "koko crunch + susu", icon: "🥣", price: 3 },
                { name: "3 Klepon / Kue Basa", icon: "🟢 + 🍡", price: 1 }
            ];

            // ------------------------------------------------------------
            // STATE
            // ------------------------------------------------------------
            let taskData = [];      // [anak][hari][tugas] = integer
            let redemptions = [];   // [anak][reward] = integer
            let dataLoaded = false;
            let currentChild = 0;
            let currentDay = 0;

            // ------------------------------------------------------------
            // FUNGSI MEMUAT DATA DARI API
            // ------------------------------------------------------------
            async function loadTaskCompletions() {
                try {
                    const response = await fetch(`${API_URL}/task-completions`);
                    if (!response.ok) throw new Error(`HTTP error ${response.status}`);
                    const data = await response.json();

                    // Inisialisasi taskData dengan 0
                    taskData = [];
                    for (let a = 0; a < children.length; a++) {
                        taskData[a] = [];
                        for (let d = 0; d < 30; d++) {
                            taskData[a][d] = new Array(tasks.length).fill(0);
                        }
                    }

                    // Isi dari database
                    data.forEach(record => {
                        const childIdx = children.findIndex(c => c.id === record.child_id);
                        if (childIdx === -1) return;
                        const day = record.day_index;
                        const taskId = record.task_id;
                        const taskIdx = taskId - 1;
                        if (day >= 0 && day < 30 && taskIdx >= 0 && taskIdx < tasks.length) {
                            taskData[childIdx][day][taskIdx] = record.count;
                        }
                    });
                } catch (error) {
                    console.error('Gagal memuat task completions:', error);
                }
            }

            async function loadRedemptions() {
                try {
                    const response = await fetch(`${API_URL}/redemptions`);
                    if (!response.ok) throw new Error(`HTTP error ${response.status}`);
                    const data = await response.json();

                    redemptions = [];
                    for (let a = 0; a < children.length; a++) {
                        redemptions[a] = new Array(rewards.length).fill(0);
                    }

                    data.forEach(record => {
                        const childIdx = children.findIndex(c => c.id === record.child_id);
                        if (childIdx === -1) return;
                        const rewardId = record.reward_id;
                        const rewardIdx = rewardId - 1;
                        if (rewardIdx >= 0 && rewardIdx < rewards.length) {
                            redemptions[childIdx][rewardIdx] = record.count;
                        }
                    });
                } catch (error) {
                    console.error('Gagal memuat redemptions:', error);
                }
            }

            async function loadAllData() {
                await Promise.all([loadTaskCompletions(), loadRedemptions()]);
                dataLoaded = true;
                renderAll();
            }

            // ------------------------------------------------------------
            // FUNGSI UPDATE KE API
            // ------------------------------------------------------------
            async function updateTaskCompletion(childId, dayIndex, taskIdx, newCount) {
                const taskId = taskIdx + 1;
                try {
                    const response = await fetch(`${API_URL}/task-completions`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            child_id: childId,
                            day_index: dayIndex,
                            task_id: taskId,
                            count: newCount
                        })
                    });
                    if (!response.ok) throw new Error(`HTTP error ${response.status}`);
                } catch (error) {
                    console.error('Gagal update task:', error);
                }
            }

            async function updateRedemption(childId, rewardIdx, newCount) {
                const rewardId = rewardIdx + 1;
                try {
                    const response = await fetch(`${API_URL}/redemptions`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            child_id: childId,
                            reward_id: rewardId,
                            count: newCount
                        })
                    });
                    if (!response.ok) throw new Error(`HTTP error ${response.status}`);
                } catch (error) {
                    console.error('Gagal update redemption:', error);
                }
            }

            // ------------------------------------------------------------
            // FUNGSI HITUNG POIN
            // ------------------------------------------------------------
            function getRawPoints() {
                let raw = [0, 0, 0, 0];
                for (let a = 0; a < 4; a++) {
                    for (let d = 0; d < 30; d++) {
                        for (let t = 0; t < tasks.length; t++) {
                            raw[a] += taskData[a][d][t] * tasks[t].point;
                        }
                    }
                }
                return raw;
            }

            function getSpentPoints() {
                let spent = [0, 0, 0, 0];
                for (let a = 0; a < 4; a++) {
                    for (let r = 0; r < rewards.length; r++) {
                        spent[a] += redemptions[a][r] * rewards[r].price;
                    }
                }
                return spent;
            }

            function getBalance() {
                let raw = getRawPoints();
                let spent = getSpentPoints();
                return raw.map((r, i) => r - spent[i]);
            }

            // ------------------------------------------------------------
            // RENDER FUNCTIONS
            // ------------------------------------------------------------
            function renderAll() {
                if (!dataLoaded) return;
                renderBalanceCards();
                renderChildTabs();
                renderTasks();
                renderRewardGrid();
            }

            function renderBalanceCards() {
                let bal = getBalance();
                let raw = getRawPoints();
                let html = '';
                children.forEach((ch, idx) => {
                    html += `
                    <div class="balance-item">
                        <span class="avatar">${ch.icon}</span>
                        <span class="name">${ch.short}</span>
                        <span class="value">${bal[idx]}</span>
                        <span class="small">total ${raw[idx]}</span>
                    </div>
                `;
                });
                document.getElementById('balanceCards').innerHTML = html;
            }

            function renderChildTabs() {
                let html = '';
                children.forEach((ch, idx) => {
                    html += `<button class="tab-child ${idx === currentChild ? 'active' : ''}" data-child-index="${idx}">${ch.icon} ${ch.name}</button>`;
                });
                document.getElementById('childTabs').innerHTML = html;

                document.querySelectorAll('.tab-child').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        currentChild = parseInt(e.target.dataset.childIndex);
                        renderAll();
                    });
                });
            }

            function renderTasks() {
                let dayData = taskData[currentChild][currentDay];
                let html = '';
                tasks.forEach((task, t) => {
                    html += `
                    <div class="task-row">
                        <span class="task-icon">${task.icon}</span>
                        <span class="task-name">${task.name}</span>
                        <span class="task-point">${task.point} poin</span>
                        <div class="task-counter">
                            <button class="decr" data-task="${t}">−</button>
                            <span class="count" data-task="${t}">${dayData[t]}</span>
                            <button class="incr" data-task="${t}">+</button>
                        </div>
                    </div>
                `;
                });
                document.getElementById('tasksContainer').innerHTML = html;
                document.getElementById('currentDateDisplay').innerText = getFormattedDate(currentDay);

                document.querySelectorAll('.incr').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        let taskIdx = parseInt(e.target.dataset.task);
                        let newCount = taskData[currentChild][currentDay][taskIdx] + 1;
                        taskData[currentChild][currentDay][taskIdx] = newCount;
                        await updateTaskCompletion(children[currentChild].id, currentDay, taskIdx, newCount);
                        renderAll();
                    });
                });
                document.querySelectorAll('.decr').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        let taskIdx = parseInt(e.target.dataset.task);
                        if (taskData[currentChild][currentDay][taskIdx] > 0) {
                            let newCount = taskData[currentChild][currentDay][taskIdx] - 1;
                            taskData[currentChild][currentDay][taskIdx] = newCount;
                            await updateTaskCompletion(children[currentChild].id, currentDay, taskIdx, newCount);
                            renderAll();
                        }
                    });
                });
            }

            function renderRewardGrid() {
                let bal = getBalance();
                let html = '';
                rewards.forEach((reward, r) => {
                    html += `
                    <div class="reward-card">
                        <div class="reward-name"><span>${reward.icon}</span> ${reward.name}</div>
                        <div class="reward-price">${reward.price} poin</div>
                        <div class="redeem-buttons">
                `;
                    children.forEach((ch, c) => {
                        let count = redemptions[c][r];
                        let disabled = bal[c] < reward.price ? 'disabled' : '';
                        html += `
                        <button class="btn-redeem" data-child="${c}" data-reward="${r}" ${disabled}>
                            ${ch.icon} ${ch.short} <span class="redeem-count">${count}</span>
                        </button>
                    `;
                    });
                    html += `</div></div>`;
                });
                document.getElementById('rewardGrid').innerHTML = html;

                document.querySelectorAll('.btn-redeem').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        let child = parseInt(e.currentTarget.dataset.child);
                        let reward = parseInt(e.currentTarget.dataset.reward);
                        let price = rewards[reward].price;
                        let currentBal = getBalance();
                        if (currentBal[child] >= price) {
                            redemptions[child][reward] += 1;
                            await updateRedemption(children[child].id, reward, redemptions[child][reward]);
                            renderAll();
                        }
                    });
                });
            }

            // ------------------------------------------------------------
            // FUNGSI TANGGAL (1 Ramadhan 2026 = 19 Februari 2026)
            // ------------------------------------------------------------
            const monthStart = new Date(2026, 1, 19);

            function getFormattedDate(dayIndex) {
                let d = new Date(monthStart);
                d.setDate(monthStart.getDate() + dayIndex);
                const weekday = d.toLocaleDateString('id-ID', { weekday: 'long' });
                const day = d.toLocaleDateString('id-ID', { day: 'numeric' });
                const month = d.toLocaleDateString('id-ID', { month: 'short' });
                const year = d.getFullYear();
                return `Hari ${weekday} · ${day} ${month} ${year}`;
            }

            // ------------------------------------------------------------
            // EVENT LISTENER NAVIGASI TANGGAL
            // ------------------------------------------------------------
            document.getElementById('prevDateBtn').addEventListener('click', () => {
                if (currentDay > 0) {
                    currentDay--;
                    renderTasks();
                    renderBalanceCards();
                }
            });
            document.getElementById('nextDateBtn').addEventListener('click', () => {
                if (currentDay < 29) {
                    currentDay++;
                    renderTasks();
                    renderBalanceCards();
                }
            });

            // ------------------------------------------------------------
            // TOMBOL RESET
            // ------------------------------------------------------------
            // ------------------------------------------------------------
            // TOMBOL RESET
            // ------------------------------------------------------------
            document.getElementById('resetBtn').addEventListener('click', async () => {
                if (confirm('Mulai dari awal? Semua progres tugas dan penukaran reward akan dihapus secara permanen.')) {
                    try {
                        const response = await fetch(`${API_URL}/reset`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' }
                        });
                        if (!response.ok) throw new Error('Gagal mereset data');

                        // Reload data after reset
                        await loadAllData();
                        currentChild = 0;
                        currentDay = 0;
                        renderAll();
                        alert('Semua data berhasil direset ke 0!');
                    } catch (error) {
                        console.error('Reset error:', error);
                        alert('Gagal mereset data. Pastikan koneksi internet lancar.');
                    }
                }
            });

            // ------------------------------------------------------------
            // AUTO SELECT HARI INI
            // ------------------------------------------------------------
            const today = new Date();
            today.setHours(0, 0, 0, 0); // Putar ke jam 00:00

            // Hitung selisih hari dari mulai Ramadhan (19 Feb 2026)
            if (today >= monthStart) {
                const diffTime = today - monthStart;
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

                // Pastikan range antara 0 - 29
                if (diffDays >= 0 && diffDays < 30) {
                    currentDay = diffDays;
                } else if (diffDays >= 30) {
                    currentDay = 29; // Mentok di hari terakhir jika sudah lewat
                }
            }

            // ------------------------------------------------------------
            // MULAI APLIKASI
            // ------------------------------------------------------------
            loadAllData();
        })();
    </script>
</body>

</html>
